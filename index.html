<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web GIS Map</title>

    <!-- ================== CSS SECTION ================== -->

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plugins CSS -->
    <link rel="stylesheet" href="plugins/sidebar/L.Control.Sidebar.css">
    <link rel="stylesheet" href="plugins/mouseposition/L.Control.MousePosition.css">
    <link rel="stylesheet" href="plugins/minimap/Control.MiniMap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
    <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free/dist/leaflet-geoman.css"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================== MAP CONTAINER ================== -->
    <div id="map"></div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar">
            <h3>Search Railway Line</h3>
                <input type="text" id="lineInput" placeholder="Enter OSM ID">
            <button onclick="searchLine()">Search</button>

        <h3>Search Station</h3>
            <input type="text" id="pointInput" placeholder="Enter station name">
            <button onclick="searchPoint()">Search</button>
        </div>
    </div>

    <!-- ================== JAVASCRIPT SECTION ================== -->

    <!-- Core Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"></script>

    <!-- Plugins -->
    <script src="plugins/sidebar/L.Control.Sidebar.js"></script>
    <script src="plugins/mouseposition/L.Control.MousePosition.js"></script>
    <script src="plugins/minimap/Control.MiniMap.min.js"></script>
    <script src="plugins/ajax/leaflet.ajax.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
    <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free/dist/leaflet-geoman.js"></script>

    <!-- ================== MAIN SCRIPT ================== -->
    <script>

    // ================== MAP INITIALIZATION ==================
    // Setting map view to Kenya (learning how center + zoom works)
    const map = L.map('map').setView([0.0236, 37.9062], 6);

    // ================== BASE MAPS ==================
    const OpenStreetMap = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
    );

    const Esri_WorldImagery = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
    );

    const GoogleStreets = L.tileLayer(
        'http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
        { subdomains: ['mt0','mt1','mt2','mt3'] }
    );

    // Add default basemap
    GoogleStreets.addTo(map);

    // UI CONTROLS 

    // Sidebar
    const sidebar = L.control.sidebar('sidebar', { position: 'left' });
    map.addControl(sidebar);

    L.easyButton('<i class="fa fa-exchange" aria-hidden="true"></i>', function(){
        sidebar.toggle();
    }).addTo(map);

    // Scale
    L.control.scale({ imperial: false }).addTo(map);

    // Mouse position
    L.control.mousePosition().addTo(map);

    // Measure tool
    L.control.polylineMeasure().addTo(map);

    // Mini map
    const miniMapLayer = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
    );

    new L.Control.MiniMap(miniMapLayer).addTo(map);

    // Geoman drawing tools
    map.pm.addControls({
        position: 'topleft',
        drawCircleMarker: false
    });

    // ==================  DATA + STYLING ==================

    // Styling railway lines based on attribute (learning classification)
    function styleRailway(feature) {
        const name = feature.properties.name;

        switch (name) {
            case 'Mombasa-Nairobi Standard Gauge Railway':
                return { color: 'red', weight: 3 };
            case 'Nairobi-Naivasha Standard Gauge Railway':
                return { color: 'green', weight: 5 };
            case 'Train railway':
                return { color: 'orange', weight: 4 };  
            case 'SGR Nairobi Naivasha':
                return { color: 'purple', weight: 2 }; 
            case 'SGR-MGR Passenger Rail Link':
                return { color: 'brown', weight: 3 }; 
            case 'NICD - Longonot Railway Link':
                return { color: 'teal', weight: 3 };   
            case 'SGR-MRG Link':
                return { color: 'cyan', weight: 3 }; 
            case 'Uganda Railway':
                return { color: 'magenta', weight: 4 };   
            case 'SGR Naivasha–Kisumu':
                return { color: 'yellow', weight: 3 };                 
            default:
                return { color: 'blue', weight: 2 };
        }
    }

// Load GeoJSON railway lines
const railwayLines = new L.GeoJSON.AJAX(
    "data/Railway_lines.geojson",
    {
        style: styleRailway,
        onEachFeature: onEachRailwayFeature
    }
).addTo(map);

// Fit map to data once loaded
railwayLines.on('data:loaded', function () {
    map.fitBounds(railwayLines.getBounds());
});

// Load GEOJSON railway points and style as circle markers with popups (learning point symbology and popups)
const railwayPoints = new L.GeoJSON.AJAX(
    "data/Railway_points.geojson",
    {
        pointToLayer: function (feature, latlng) {
            return L.circleMarker(latlng, {
                radius: 6,
                fillColor: 'yellow',
                color: 'black',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            });
        },
        onEachFeature: function (feature, layer) {
            const props = feature.properties;
            const name = props.name || "Unnamed Point";
            const popupContent = `
                <strong>${name}</strong><br/>
                Type: ${props.type || "N/A"}<br/>
                OSM ID: ${props.osm_id}<br/>
                Source: ${props.source || "N/A"}
            `;
            layer.bindPopup(popupContent);
        }
    }
).addTo(map);

// ================== FEATURE HANDLING ==================
function onEachRailwayFeature(feature, layer) {

    const props = feature.properties;

    // Handle missing names
    let name = props.name || "Unnamed Railway Line";

    // Popup content
    const popupContent = `
        <strong>${name}</strong><br/>
        Railway Type: ${props.railway}<br/>
        OSM ID: ${props.osm_id}<br/>
        Source: ${props.source || "N/A"}
    `;

    // Bind popup 
    layer.bindPopup(popupContent);

    // Tooltip on CLICK 
    layer.on('click', function (e) {
        const tooltipContent = `
            <strong>${name}</strong><br/>
            Clicked at: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}
        `;

        layer.bindTooltip(tooltipContent, { permanent: false }).openTooltip();
    });
}
// Note: The above function handles both popups and click tooltips for railway lines, demonstrating interactivity and dynamic content based on feature attributes and user interaction. 


    // ==================  LAYER CONTROL ==================
    const baseMaps = {
        "OpenStreetMap": OpenStreetMap,
        "Esri Imagery": Esri_WorldImagery,
        "Google Streets": GoogleStreets
    };

    const overlays = {
        "Railway Lines": railwayLines,
        "Railway Points": railwayPoints,
    };

    L.control.layers(baseMaps, overlays).addTo(map);

    </script>

</body>
</html>
