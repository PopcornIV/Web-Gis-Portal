<script> 
//  Map initialisation, with location cordinates and a zoom level
    var map = L.map('map').setView([0.0236, 37.9062], 6);

// Map tile layer, for this case OpenStreetMap tile layer
    var OpenStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 100,
        attribution: '© OpenStreetMap contributors'
    });

		var Esri_WorldImagery_minimap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom: 23});

// Stadia.Alidade tile layer
 
    var Stadia_AlidadeSatellite = L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_satellite/{z}/{x}/{y}{r}.{ext}', {
	maxZoom: 100,
	ext: 'jpg'
    }) ;

// Esrimaps tile layer
    var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 100,
    });

// Google Streets tile layer
    var GoogleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
    });

// Adding the tile layer to the map
    GoogleStreets.addTo(map);

// Layer control
// sidebar control
    var sidebar = L.control.sidebar('sidebar', {
    position: 'left'
   });

   map.addControl(sidebar);

    L.easyButton('fa-exchange-alt', function(btn, map){
    sidebar.toggle();
    }).addTo(map);

// Base maps object
    var baseMaps = {
    "OpenStreetMap": OpenStreetMap,

    "Esri World Imagery": Esri_WorldImagery,
    "Google Streets": GoogleStreets
    };

    L.control.layers(baseMaps).addTo(map);

    ).addTo(map);

}); 

// event listener for created layer
map.on('pm:create', function(e) {
  console.log(e);
}); 

// mini map control
var miniMap = new L.Control.MiniMap(Esri_WorldImagery_minimap, {position: 'bottomright'}).addTo(map);

// Adding GeoJSON data to the map
// Railway lines GeoJSON data
var Railway_lines = new L.GeoJSON.AJAX("data/Railway_lines.geojson" , {style:style_railway_lines}).addTo(map);

function style_railway_lines(feature) {
    var attributeValue = feature.properties ['name'];
    var color;
    var weight;
    console.log(attributeValue);

    switch (attributeValue) {
        case 'Mombasa-Nairobi Standard Gauge Railway':
            return { color: 'red', weight: 3 };
            ;
        case 'NICD - Longonot Railway Link':
            return { color: 'orange', weight: 3 };
        case 'Nairobi-Naivasha Standard Gauge Railway':
            return { color: 'green', weight: 5 };
        case 'SGR-MGR Passanger Rail link':
            return { color: 'teal', weight: 5 };
        case 'SGR Nairobi-Naivasha':
            return { color: 'purple', weight: 5 };
        case 'Uganda Railway':
            return { color: 'brown', weight: 5 };
        default:
            return { color: 'blue', weight: 3 };
    }
}
    
Railway_lines.on('data:loaded', function() {
    map.fitBounds(Railway_lines.getBounds());
    });

Railway_lines.addTo(map);
